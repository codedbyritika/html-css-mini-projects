<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple login page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <form action="#">
            <!--title of login page-->
           <div class="title">Login</div> 

           <!--email-->
           <div class="input-box">
            <input type="text" placeholder="Enter Your Email" required>
            <div class="underline"></div>
           </div>

           <!--password-->
           <div class="input-box">
            <input type="password" placeholder="Enter Your Password" required>
            <div class="underline"></div>
           </div>

           <!--submit button-->
             <div class="input-box button" >
            <input type="submit" value="Continue">
           </div>
           
        </form>

        <!--outisode form having other options to connect-->
        <div class="option">or Connect with Social Media</div>

        <!--google link-->
        <div class="google">
            <a href="#"><i class="fa-brands fa-google"></i>Login with Google</a>
        </div>

        <!--twitter linke-->
        <div class="twitter">
            <a href="#"><i class="fa-brands fa-twitter"></i>Login with Twitter</a>
        </div>

        <!--Face book link-->
        <div class="facebook">
            <a href="#"><i class="fa-brands fa-facebook-f"></i>Login with Facebook</a>
        </div>

        <p class="signup-text">
  Don't have an account? <a href="#">Sign up</a>
</p>
    </div>
</body>
</html>
